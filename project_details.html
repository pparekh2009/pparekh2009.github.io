<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc</title>

    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
	<link rel="stylesheet" href="./assets/css/aos.css">
	<link rel="stylesheet" href="./assets/css/line-awesome.min.css">
	<link rel="stylesheet" href="./assets/css/style.css">

    <style>
        #title-image {
            height: 30vh;
            filter: blur(4px);
        }

        #project-header {
            color: var(--color-base);
            padding: 10px;
        }

        .features-container, .benefits-container, .disclaimers-container {
            margin-top: 40px;
        }
    </style>
</head>
<body>
    
    <div class="position-relative overflow-hidden">
        <img id="title-image" class="w-100 object-fit-cover" alt="title_image">
        <h1 id="project-header" class="position-absolute bottom-0 m-auto w-100"></h1>
    </div>

    <div class="desc-container m-4">
        <h2>About</h2>
        <p id="project-description"></p>

        <div class="features-container">
            <h3>Features</h3>
            <ul id="feature-list"></ul>
        </div>

        <div class="benefits-container">
            <h3>Benefits</h3>
            <ul id="benefit-list"></ul>
        </div>

        <div class="disclaimers-container">
            <h3>Disclaimers</h3>
            <ul id="disclaimer-list"></ul>
        </div>
    </div>

    <div class="row gy-5 m-3">

        <h2>Tech Stack</h2>

        <div class="col-lg-6 mb-5">
            <div class="tech-container row gy-2 d-lg-grid">
                <!-- <div class="tech-card bg-base rounded-4" data-aos="fade-up" data-aos-delay="400">
                    <img class="rounded-4" src="./assets/images/tech/java.png">
                    <span class="tech-label fw-bold">Java</span>
                </div> -->
            </div>
        </div>

    </div>

    <div id="link-container">
        <!-- <h4><a class="link-custom text-brand">View on Github</a></h4> -->
    </div>

    <div class="carousel-wrapper justify-content-center" id="image-container" style="width: 400px; height: 600px; overflow: hidden">
        <div class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000" style="height: 100%">
            <div id="carousel-wrapper" class="carousel-inner" style="height: 100%">

                <a class="carousel-control-prev" role="button" data-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="sr-only">Previous</span>
                </a>
                <a class="carousel-control-next" role="button" data-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="sr-only">Next</span>
                </a>
            </div>
      </div>
    </div>

    <script src="./assets/js/bootstrap.bundle.min.js"></script>
	<script src="./assets/js/aos.js"></script>
	<script src="./assets/js/main.js"></script>
    <script type="module" src="./assets/js/proj_details.js"></script>
</body>
</html>
